<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Update — Joy Powell</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink-2:#4a4740;--ink-3:#9a9590;
  --rule:#e4dfd9;--page:#faf8f5;--cream:#f3efe9;--accent:#c84b2f;
  --green:#2d6a4f;--green-bg:#e8f3ee;
  --amber:#955a08;--amber-bg:#fdf0e4;
  --red:#a32d2d;--red-bg:#fbeded;
  --blue:#1d4e89;--blue-bg:#e8eef7;
  --purple:#534AB7;--purple-bg:#EEEDFE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--page);color:var(--ink);min-height:100vh}

.masthead{border-bottom:2px solid var(--ink);padding:1.75rem 3rem 1.25rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.kicker{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.masthead h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,4vw,40px);line-height:1;letter-spacing:-.01em}
.masthead-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.03em;padding:8px 16px;border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--ink-2);border:1.5px solid var(--rule)}
.btn-ghost:hover{border-color:var(--ink-2);color:var(--ink)}
.btn-primary{background:var(--ink);color:var(--page);border:1.5px solid var(--ink)}
.btn-primary:hover{background:var(--accent);border-color:var(--accent)}
.week-chip{font-size:12px;font-weight:500;color:var(--ink-2);padding:5px 14px;background:var(--cream);border:1.5px solid var(--rule);border-radius:2px}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border-bottom:1px solid var(--rule)}
.stat{background:var(--page);padding:1rem 2rem}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--ink-3);margin-top:2px;letter-spacing:.04em}

.body-wrap{max-width:1400px;margin:0 auto}
.layout{display:grid;grid-template-columns:2fr 1fr 1fr}
.col{padding:2rem 2.5rem;border-right:1px solid var(--rule)}
.col:last-child{border-right:none}

.sec-label{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;margin-top:1.75rem}
.col > .sec-label:first-child,.owner-head:first-child{margin-top:0}
.sec-label-text{font-size:10px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3)}
.sec-label::after{content:'';flex:1;height:1px;background:var(--rule)}

.owner-head{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);padding:10px 0 6px;border-bottom:2px solid var(--ink);margin-top:1.75rem;margin-bottom:4px}
.group-head{font-size:11px;font-weight:500;color:var(--ink-2);padding:8px 0 4px;border-bottom:1px dashed var(--rule);margin-top:1rem;margin-bottom:2px}
.group-head:first-of-type{margin-top:4px}

.items{display:flex;flex-direction:column}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--rule)}
.item:last-child{border-bottom:none}
.item-body{flex:1;min-width:0}
.item-text{font-size:13px;line-height:1.5;color:var(--ink)}
.item-meta{font-size:11px;color:var(--ink-3);margin-top:2px;line-height:1.4}
.badge{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;margin-top:3px}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--cream);color:var(--ink-3)}
.team-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:2px;margin-bottom:3px}

.reactions{display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 0;align-items:center}
.react-lbl{font-size:11px;color:var(--ink-3)}
.rc{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border:1px solid var(--rule);border-radius:2px;cursor:pointer;background:transparent;color:var(--ink-2);transition:all .15s}
.rc:hover{border-color:var(--ink-2);color:var(--ink)}
.rc.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);font-weight:500}

.comment{display:flex;gap:8px;margin-bottom:10px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:2px}
.av-joy{background:var(--blue-bg);color:var(--blue)}
.av-jason{background:var(--amber-bg);color:var(--amber)}
.cb{flex:1;min-width:0}
.cw{font-size:10px;font-weight:500;color:var(--ink-3);margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase}
.ct{font-size:12px;color:var(--ink);line-height:1.4;background:var(--cream);padding:7px 10px;border-radius:2px}
.cdel{background:none;border:none;cursor:pointer;font-size:11px;color:var(--rule);padding:2px;margin-top:4px;transition:color .1s;display:block}
.cdel:hover{color:var(--accent)}
.comment-input-row{display:flex;gap:8px;align-items:flex-start;margin-top:10px}
.comment-ta{flex:1;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:white;color:var(--ink);resize:none;outline:none;min-height:36px}
.comment-ta:focus{border-color:var(--ink-2)}
.csend{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;background:var(--ink);color:var(--page);border:none;border-radius:2px;cursor:pointer}
.csend:hover{background:var(--accent)}

.role-wrap{display:flex;align-items:center;gap:6px}
.role-lbl{font-size:11px;color:var(--ink-3)}
.rtoggle{display:flex;border:1.5px solid var(--rule);border-radius:2px;overflow:hidden}
.rbtn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;border:none;background:transparent;color:var(--ink-2);transition:all .15s}
.rbtn.active{background:var(--ink);color:var(--page)}

.overlay{display:none;position:fixed;inset:0;background:rgba(26,24,20,.55);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--page);border:2px solid var(--ink);padding:2rem;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto}
.modal h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:1.25rem}
.export-text{font-family:monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;background:var(--cream);border:1px solid var(--rule);padding:1rem;max-height:360px;overflow-y:auto;color:var(--ink-2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

.saved{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s;margin-left:4px}
.saved.show{opacity:1}
.empty{font-size:12px;color:var(--ink-3);font-style:italic;padding:6px 0 10px}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .col{padding:1.5rem;border-right:none;border-bottom:1px solid var(--rule)}
  .col:last-child{border-bottom:none}
  .masthead{padding:1.25rem 1.5rem}
  .stats-bar{grid-template-columns:1fr 1fr}
  .stat{padding:.75rem 1.25rem}
}
</style>
</head>
<body>

<div class="masthead">
  <div>
    <div class="kicker">Keller Williams — Industry &amp; Learning</div>
    <h1>Weekly Status</h1>
  </div>
  <div class="masthead-actions">
    <div class="role-wrap">
      <span class="role-lbl">View as</span>
      <div class="rtoggle">
        <button class="rbtn active" id="rbtn-joy" onclick="setRole('joy')">Joy</button>
        <button class="rbtn" id="rbtn-jason" onclick="setRole('jason')">Jason</button>
      </div>
    </div>
    <span class="week-chip" id="week-chip"></span>
    <button class="btn btn-ghost" onclick="openExport()">Export</button>
    <span class="saved" id="saved">Saved</span>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="body-wrap">
  <div class="layout">
    <div class="col" id="col-projects"></div>
    <div class="col" id="col-mid"></div>
    <div class="col" id="col-right"></div>
  </div>
</div>

<div class="overlay" id="export-overlay">
  <div class="modal">
    <h2>Export for Jason</h2>
    <div class="export-text" id="export-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeExport()">Close</button>
      <button class="btn btn-primary" id="copy-btn" onclick="copyExport()">Copy to clipboard</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'kwi_tracker_v5';
const REACT_OPTS = ['Looks good','Need to discuss','Concerned','Great progress'];
const STATUS_MAP = {
  'on-track':{label:'On track',cls:'b-green'},
  'at-risk':{label:'At risk',cls:'b-amber'},
  'blocked':{label:'Blocked',cls:'b-red'},
  'complete':{label:'Complete',cls:'b-blue'},
};

const BAKED_DATA = {
  content: [
    {
      category:'Courses',
      items:[
        {text:'MBR', team:"Robert's Team", teamCls:'b-blue', meta:'Met with Jason to lock down overview', status:'on-track'},
        {text:'OP Bootcamp', team:"Robert's Team", teamCls:'b-blue', meta:'Interviews started', status:'on-track'},
        {text:'MREA Models', team:"Robert's Team", teamCls:'b-blue', meta:'Update pending', status:'at-risk'},
      ]
    },
    {
      category:'Agent Content',
      items:[
        {text:'Playbook audit', team:"Emily's Team", teamCls:'b-green', meta:'Emily identified a schedule — starting with Newsletters', status:'on-track'},
        {text:'AI Videos', team:'Ops Team', teamCls:'b-amber', meta:'Pending more videos from Eric', status:'at-risk'},
        {text:'Connect: Self-Study', team:'Ops Team', teamCls:'b-amber', meta:'Canva Self-Study posted. Working on Command Your Business. Received LABS request for Lonewolf Transact.', status:'on-track'},
        {text:'BT120 Spanish translation', team:'Ops Team', teamCls:'b-amber', meta:'Currently being processed', status:'on-track'},
      ]
    },
    {
      category:'Events',
      items:[
        {text:'Family Reunion', team:"Robert's Team", teamCls:'b-blue', meta:'Met with Mona, Robert & Kara 2x to transfer knowledge. Goal: breakouts ready to present in May.', status:'on-track'},
        {text:'Mega Camp', team:"Robert's Team", teamCls:'b-blue', meta:'Nomination form presenting on Growth Call in two weeks. Robert working with Growth team on MMCC breakouts.', status:'on-track'},
      ]
    },
  ],
  operations: [
    {
      category:'Learning Center',
      items:[
        {text:'Registration tracking system', team:'Ops Team', teamCls:'b-amber', meta:'Created system with Events & Janelle. Confirmed MC Financial speakers and created flyer. Working on other confirmations.', status:'on-track'},
      ]
    },
    {
      category:'Masterminds',
      items:[
        {text:'Masterminds In-Person', team:'Ops Team', teamCls:'b-amber', meta:'Individual Agents: 96 · Teams/Groups/MREA: 67 · Business: 21 · Top 100 · TLs: 23 · Top Single OP: 9 · Top Multiple OP: 16', status:'on-track'},
      ]
    },
  ],
  joy: [
    {text:'Course creation process', meta:"Drafting from old working theory + Jason's input", status:'on-track'},
  ],
  wins: [
    {text:'KW Productivity Huddle — first call went well!', meta:'Learned some lessons along the way'},
  ],
  blockers: [
    {text:'AI Videos — Marketing wants to own strategy', meta:'Blocking progress on AI video pipeline'},
  ],
  milestones: [
    {text:'Growth Call — Mega Camp nomination form', meta:'Presenting in two weeks'},
    {text:'FR breakouts', meta:'Goal to have breakouts ready to present in May'},
  ],
  dataLinks: [
    {text:'Self-Study Data', url:'https://docs.google.com/spreadsheets/d/1Y4AOvoDxUCG2xCwN0Gq7Z1tM7fpbzvehaISLNMzqIC8/edit?gid=1549248158#gid=1549248158'},
  ]
};

let role = 'joy';

function weekLabel(){
  const now=new Date(), day=now.getDay(), diff=day===0?-6:1-day;
  const mon=new Date(now); mon.setDate(now.getDate()+diff);
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(mon)} \u2013 ${fmt(fri)}`;
}

function loadMeta(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{reactions:{},comments:[]};}catch{return {reactions:{},comments:[]};} }
function saveMeta(m){ localStorage.setItem(STORAGE_KEY,JSON.stringify(m)); flash(); }
function flash(){ const e=document.getElementById('saved'); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),1600); }

function setRole(r){
  role=r;
  document.getElementById('rbtn-joy').classList.toggle('active',r==='joy');
  document.getElementById('rbtn-jason').classList.toggle('active',r==='jason');
  render();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function allItems(){
  const all=[];
  BAKED_DATA.content.forEach(g=>g.items.forEach(i=>all.push(i)));
  BAKED_DATA.operations.forEach(g=>g.items.forEach(i=>all.push(i)));
  BAKED_DATA.joy.forEach(i=>all.push(i));
  return all;
}

function render(){
  document.getElementById('week-chip').textContent = weekLabel();
  const all=allItems();
  const total=all.length, complete=all.filter(p=>p.status==='complete').length, blocked=all.filter(p=>p.status==='blocked').length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Active projects</div></div>
    <div class="stat"><div class="stat-num">${complete}</div><div class="stat-lbl">Complete</div></div>
    <div class="stat"><div class="stat-num">${blocked}</div><div class="stat-lbl">Blocked</div></div>
    <div class="stat"><div class="stat-num">${BAKED_DATA.wins.length}</div><div class="stat-lbl">Wins this week</div></div>`;

  const projCol=document.getElementById('col-projects');
  const midCol=document.getElementById('col-mid');
  const rightCol=document.getElementById('col-right');
  projCol.innerHTML=''; midCol.innerHTML=''; rightCol.innerHTML='';

  projCol.appendChild(buildProjectsCol());
  midCol.appendChild(buildSimple('Key wins & highlights', BAKED_DATA.wins));
  midCol.appendChild(buildSimple('Blockers & risks', BAKED_DATA.blockers));
  midCol.appendChild(buildSimple('Upcoming milestones', BAKED_DATA.milestones));
  rightCol.appendChild(buildDataAnalytics());
  rightCol.appendChild(buildReactions());
  rightCol.appendChild(buildComments());
}

function buildProjectsCol(){
  const wrap=document.createElement('div');

  const mainLabel=document.createElement('div');
  mainLabel.className='sec-label';
  mainLabel.innerHTML='<span class="sec-label-text">Active projects</span>';
  wrap.appendChild(mainLabel);

  ['content','operations','joy'].forEach(owner=>{
    const oh=document.createElement('div');
    oh.className='owner-head';
    oh.textContent=owner==='joy'?'Joy':owner.charAt(0).toUpperCase()+owner.slice(1);
    wrap.appendChild(oh);

    if(owner==='joy'){
      const list=document.createElement('div');
      list.className='items';
      BAKED_DATA.joy.forEach(it=>list.appendChild(buildItemRow(it)));
      wrap.appendChild(list);
    } else {
      BAKED_DATA[owner].forEach(group=>{
        const gh=document.createElement('div');
        gh.className='group-head';
        gh.textContent=group.category;
        wrap.appendChild(gh);
        const list=document.createElement('div');
        list.className='items';
        group.items.forEach(it=>list.appendChild(buildItemRow(it)));
        wrap.appendChild(list);
      });
    }
  });

  return wrap;
}

function buildItemRow(it){
  const row=document.createElement('div');
  row.className='item';
  const teamTag=it.team?`<div><span class="team-tag ${it.teamCls||'b-gray'}">${esc(it.team)}</span></div>`:'';
  const badge=`<span class="badge ${STATUS_MAP[it.status||'on-track'].cls}">${STATUS_MAP[it.status||'on-track'].label}</span>`;
  const meta=it.meta?`<div class="item-meta">${esc(it.meta)}</div>`:'';
  row.innerHTML=`<div class="item-body">${teamTag}<div class="item-text">${esc(it.text)}</div>${meta}</div>${badge}`;
  return row;
}

function buildSimple(title, items){
  const wrap=document.createElement('div');
  const label=document.createElement('div');
  label.className='sec-label';
  label.innerHTML=`<span class="sec-label-text">${esc(title)}</span>`;
  wrap.appendChild(label);
  const list=document.createElement('div');
  list.className='items';
  if(!items.length){
    list.innerHTML='<div class="empty">Nothing this week.</div>';
  } else {
    items.forEach(it=>{
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML=`<div class="item-body"><div class="item-text">${esc(it.text)}</div>${it.meta?`<div class="item-meta">${esc(it.meta)}</div>`:''}</div>`;
      list.appendChild(row);
    });
  }
  wrap.appendChild(list);
  return wrap;
}

function buildDataAnalytics(){
  const wrap=document.createElement('div');
  const label=document.createElement('div');
  label.className='sec-label';
  label.innerHTML='<span class="sec-label-text">Data & analytics</span>';
  wrap.appendChild(label);
  const list=document.createElement('div');
  list.className='items';
  BAKED_DATA.dataLinks.forEach(link=>{
    const row=document.createElement('div');
    row.className='item';
    row.innerHTML=`<div class="item-body"><div class="item-text">${esc(link.text)}</div>
      <div class="item-meta"><a href="${link.url}" target="_blank" style="color:var(--blue);font-size:11px;text-decoration:none;border-bottom:1px solid var(--blue-bg)">Open spreadsheet \u2192</a></div></div>`;
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function buildReactions(){
  const meta=loadMeta(), r=meta.reactions||{};
  const wrap=document.createElement('div');
  const label=document.createElement('div');
  label.className='sec-label';
  label.innerHTML='<span class="sec-label-text">Jason\'s reactions</span>';
  wrap.appendChild(label);
  const reacts=document.createElement('div');
  reacts.className='reactions';
  reacts.innerHTML=`<span class="react-lbl">${role==='jason'?'React:':'Reactions:'}</span>`+
    REACT_OPTS.map(opt=>`<button class="rc${r[opt]?' on':''}" onclick="toggleReact('${opt.replace(/'/g,"\\'")}')">${esc(opt)}</button>`).join('');
  wrap.appendChild(reacts);
  return wrap;
}

function buildComments(){
  const meta=loadMeta(), comments=meta.comments||[];
  const wrap=document.createElement('div');
  const label=document.createElement('div');
  label.className='sec-label';
  label.innerHTML=`<span class="sec-label-text">Comments (${comments.length})</span>`;
  wrap.appendChild(label);
  if(!comments.length){
    const e=document.createElement('div'); e.className='empty'; e.textContent='No comments yet.';
    wrap.appendChild(e);
  } else {
    comments.forEach((c,i)=>{
      const isJoy=c.who==='joy';
      const div=document.createElement('div'); div.className='comment';
      const del=(role===c.who)?`<button class="cdel" onclick="delComment(${i})">x remove</button>`:'';
      div.innerHTML=`<div class="av ${isJoy?'av-joy':'av-jason'}">${isJoy?'JP':'JA'}</div>
        <div class="cb"><div class="cw">${isJoy?'Joy':'Jason'}</div>
        <div class="ct">${esc(c.text)}</div>${del}</div>`;
      wrap.appendChild(div);
    });
  }
  const inputRow=document.createElement('div');
  inputRow.className='comment-input-row';
  inputRow.innerHTML=`<div class="av ${role==='joy'?'av-joy':'av-jason'}">${role==='joy'?'JP':'JA'}</div>
    <textarea class="comment-ta" id="comment-ta" placeholder="${role==='joy'?'Joy':'Jason'}, add a comment..." rows="1"></textarea>
    <button class="csend" onclick="addComment()">Send</button>`;
  wrap.appendChild(inputRow);
  return wrap;
}

function toggleReact(opt){
  if(role!=='jason') return;
  const meta=loadMeta();
  if(!meta.reactions) meta.reactions={};
  meta.reactions[opt]=!meta.reactions[opt];
  saveMeta(meta); render();
}

function addComment(){
  const ta=document.getElementById('comment-ta');
  if(!ta) return;
  const text=ta.value.trim(); if(!text) return;
  const meta=loadMeta();
  if(!meta.comments) meta.comments=[];
  meta.comments.push({who:role,text,ts:Date.now()});
  saveMeta(meta); render();
}

function delComment(idx){
  const meta=loadMeta();
  meta.comments.splice(idx,1);
  saveMeta(meta); render();
}

function buildExportText(){
  const lines=[`WEEKLY UPDATE \u2014 ${weekLabel().toUpperCase()}`,'Joy Powell \u00b7 Industry & Learning Operations, KWRI',''];
  lines.push('ACTIVE PROJECTS','='.repeat(44),'');
  ['content','operations','joy'].forEach(owner=>{
    lines.push(owner==='joy'?'Joy':owner.charAt(0).toUpperCase()+owner.slice(1));
    lines.push('\u2500'.repeat(32));
    if(owner==='joy'){
      BAKED_DATA.joy.forEach(it=>lines.push(`  \u2022 ${it.text}  [${STATUS_MAP[it.status||'on-track'].label}]${it.meta?' \u2014 '+it.meta:''}`));
    } else {
      BAKED_DATA[owner].forEach(g=>{
        lines.push(`  ${g.category}`);
        g.items.forEach(it=>lines.push(`    \u2022 ${it.text}  [${STATUS_MAP[it.status||'on-track'].label}]${it.meta?' \u2014 '+it.meta:''}`));
      });
    }
    lines.push('');
  });
  lines.push('KEY WINS & HIGHLIGHTS','='.repeat(44));
  BAKED_DATA.wins.forEach(w=>lines.push(`\u2022 ${w.text}${w.meta?' \u2014 '+w.meta:''}`));
  lines.push('');
  lines.push('BLOCKERS & RISKS','='.repeat(44));
  BAKED_DATA.blockers.forEach(b=>lines.push(`\u2022 ${b.text}${b.meta?' \u2014 '+b.meta:''}`));
  lines.push('');
  lines.push('UPCOMING MILESTONES','='.repeat(44));
  BAKED_DATA.milestones.forEach(m=>lines.push(`\u2022 ${m.text}${m.meta?' \u2014 '+m.meta:''}`));
  return lines.join('\n');
}

function openExport(){ document.getElementById('export-body').textContent=buildExportText(); document.getElementById('export-overlay').classList.add('open'); }
function closeExport(){ document.getElementById('export-overlay').classList.remove('open'); }
function copyExport(){
  navigator.clipboard.writeText(buildExportText()).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy to clipboard',2000);
  });
}
document.getElementById('export-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeExport(); });

render();
</script>
</body>
