<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Update — Joy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --ink-2: #4a4740;
  --ink-3: #9a9590;
  --rule: #e4dfd9;
  --page: #faf8f5;
  --cream: #f3efe9;
  --accent: #c84b2f;
  --green: #2d6a4f;
  --green-bg: #e8f3ee;
  --amber: #955a08;
  --amber-bg: #fdf0e4;
  --red: #a32d2d;
  --red-bg: #fbeded;
  --blue: #1d4e89;
  --blue-bg: #e8eef7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--page);color:var(--ink);min-height:100vh}

/* ── masthead ── */
.masthead{border-bottom:2px solid var(--ink);padding:1.75rem 3rem 1.25rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.kicker{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.masthead h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,4vw,40px);line-height:1;letter-spacing:-.01em}
.masthead-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.03em;padding:8px 16px;border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--ink);color:var(--page);border:1.5px solid var(--ink)}
.btn-primary:hover{background:var(--accent);border-color:var(--accent)}
.btn-ghost{background:transparent;color:var(--ink-2);border:1.5px solid var(--rule)}
.btn-ghost:hover{border-color:var(--ink-2);color:var(--ink)}

.week-nav{display:flex;align-items:center;gap:6px}
.wbtn{background:transparent;border:1.5px solid var(--rule);border-radius:2px;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.wbtn:hover{border-color:var(--ink-2)}
.week-chip{font-size:12px;font-weight:500;color:var(--ink-2);padding:5px 12px;background:var(--cream);border:1.5px solid var(--rule);border-radius:2px;min-width:160px;text-align:center}

/* ── stats ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border-bottom:1px solid var(--rule)}
.stat{background:var(--page);padding:1rem 2rem}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--ink-3);margin-top:2px;letter-spacing:.04em}

/* ── layout ── */
.body-wrap{max-width:1200px;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 1fr}
.col{padding:2rem 3rem;border-right:1px solid var(--rule)}
.col:last-child{border-right:none}

/* ── sections ── */
.sec-label{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.sec-label-text{font-size:10px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3)}
.sec-label::after{content:'';flex:1;height:1px;background:var(--rule)}

.items{display:flex;flex-direction:column}
.item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--rule)}
.item:last-child{border-bottom:none}
.item-body{flex:1;min-width:0}
.item-text{font-size:14px;line-height:1.5;color:var(--ink)}
.item-meta{font-size:12px;color:var(--ink-3);margin-top:2px}
.badge{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0;margin-top:3px}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.del-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--rule);padding:2px 4px;flex-shrink:0;margin-top:2px;transition:color .1s}
.del-btn:hover{color:var(--accent)}
.empty{font-size:13px;color:var(--ink-3);font-style:italic;padding:8px 0 12px}

/* ── add form ── */
.add-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.add-input{flex:1;min-width:100px;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:white;color:var(--ink);outline:none;transition:border-color .15s}
.add-input:focus{border-color:var(--ink-2)}
.add-input::placeholder{color:var(--ink-3)}
.add-select{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 8px;border:1px solid var(--rule);border-radius:2px;background:white;color:var(--ink);cursor:pointer;outline:none}
.add-go{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;background:var(--ink);color:var(--page);border:none;border-radius:2px;cursor:pointer;transition:background .15s}
.add-go:hover{background:var(--accent)}

/* ── export modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,24,20,.55);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--page);border:2px solid var(--ink);padding:2rem;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto}
.modal h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:1.25rem}
.export-text{font-family:monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;background:var(--cream);border:1px solid var(--rule);padding:1rem;max-height:280px;overflow-y:auto;color:var(--ink-2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

/* ── role toggle ── */
.role-wrap{display:flex;align-items:center;gap:6px}
.role-lbl{font-size:11px;color:var(--ink-3);letter-spacing:.04em}
.rtoggle{display:flex;border:1.5px solid var(--rule);border-radius:2px;overflow:hidden}
.rbtn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;border:none;background:transparent;color:var(--ink-2);transition:all .15s}
.rbtn.active{background:var(--ink);color:var(--page)}

/* ── comments ── */
.comment-section{margin-top:2rem}
.comment{display:flex;gap:8px;margin-bottom:10px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-joy{background:var(--blue-bg);color:var(--blue)}
.av-jason{background:var(--amber-bg);color:var(--amber)}
.cb{flex:1;min-width:0}
.cw{font-size:10px;font-weight:500;color:var(--ink-3);margin-bottom:3px;letter-spacing:.04em;text-transform:uppercase}
.ct{font-size:13px;color:var(--ink);line-height:1.4;background:var(--cream);padding:8px 10px;border-radius:2px}
.cdel{background:none;border:none;cursor:pointer;font-size:11px;color:var(--rule);padding:2px;margin-top:2px;transition:color .1s}
.cdel:hover{color:var(--accent)}
.comment-input-row{display:flex;gap:8px;align-items:flex-start;margin-top:8px}
.comment-ta{flex:1;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:white;color:var(--ink);resize:none;outline:none;min-height:36px}
.comment-ta:focus{border-color:var(--ink-2)}
.csend{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;background:var(--ink);color:var(--page);border:none;border-radius:2px;cursor:pointer;transition:background .15s}
.csend:hover{background:var(--accent)}

/* ── reactions ── */
.reactions{display:flex;gap:6px;flex-wrap:wrap;margin-top:1rem;align-items:center}
.react-lbl{font-size:11px;color:var(--ink-3);letter-spacing:.04em}
.rc{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border:1px solid var(--rule);border-radius:2px;cursor:pointer;background:transparent;color:var(--ink-2);transition:all .15s}
.rc:hover{border-color:var(--ink-2);color:var(--ink)}
.rc.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);font-weight:500}

.saved{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
.saved.show{opacity:1}

@media(max-width:700px){
  .masthead{padding:1.25rem 1.5rem}
  .two-col{grid-template-columns:1fr}
  .col{padding:1.5rem;border-right:none;border-bottom:1px solid var(--rule)}
  .col:last-child{border-bottom:none}
  .stats-bar{grid-template-columns:1fr 1fr}
  .stat{padding:.75rem 1.25rem}
}
</style>
</head>
<body>

<div class="masthead">
  <div>
    <div class="kicker">Keller Williams — Industry &amp; Learning</div>
    <h1>Weekly Status</h1>
  </div>
  <div class="masthead-actions">
    <div class="role-wrap">
      <span class="role-lbl">View as</span>
      <div class="rtoggle">
        <button class="rbtn active" id="rbtn-joy" onclick="setRole('joy')">Joy</button>
        <button class="rbtn" id="rbtn-jason" onclick="setRole('jason')">Jason</button>
      </div>
    </div>
    <div class="week-nav">
      <button class="wbtn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-chip" id="week-chip">...</span>
      <button class="wbtn" onclick="shiftWeek(1)">›</button>
    </div>
    <button class="btn btn-ghost" onclick="openExport()">Export</button>
    <button class="btn btn-primary" onclick="newWeek()">New week</button>
    <span class="saved" id="saved">Saved</span>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="body-wrap">
  <div class="two-col">
    <div class="col" id="col-left"></div>
    <div class="col" id="col-right"></div>
  </div>
</div>

<div class="overlay" id="export-overlay">
  <div class="modal">
    <h2>Export for Jason</h2>
    <div class="export-text" id="export-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeExport()">Close</button>
      <button class="btn btn-primary" id="copy-btn" onclick="copyExport()">Copy to clipboard</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'kwi_weekly_v3';
const STATUS_MAP = {
  'on-track':{label:'On track',cls:'b-green'},
  'at-risk':{label:'At risk',cls:'b-amber'},
  'blocked':{label:'Blocked',cls:'b-red'},
  'complete':{label:'Complete',cls:'b-blue'},
};
const REACT_OPTS = ['Looks good','Need to discuss','Concerned','Great progress'];

let role = 'joy';
let weekOffset = 0;

function weekKey(o=weekOffset){
  const now = new Date();
  const day = now.getDay();
  const diff = (day===0?-6:1-day)+o*7;
  const d = new Date(now); d.setDate(now.getDate()+diff); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function weekLabel(o=weekOffset){
  const mon = new Date(weekKey(o));
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  const fmt = d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(mon)} – ${fmt(fri)}`;
}

function loadAll(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; }catch{ return {}; } }
function saveAll(all){ localStorage.setItem(STORAGE_KEY,JSON.stringify(all)); flash(); }
function currentData(){
  const all = loadAll(), k = weekKey();
  if(!all[k]) all[k]={projects:[],wins:[],blockers:[],milestones:[],reactions:{},comments:[]};
  return all[k];
}
function saveData(d){ const all=loadAll(); all[weekKey()]=d; saveAll(all); }

function flash(){
  const el=document.getElementById('saved');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1600);
}

function setRole(r){
  role=r;
  document.getElementById('rbtn-joy').classList.toggle('active',r==='joy');
  document.getElementById('rbtn-jason').classList.toggle('active',r==='jason');
  render();
}

function shiftWeek(d){ weekOffset+=d; render(); }

function newWeek(){
  if(!confirm('Clear this week and start fresh?')) return;
  const all=loadAll();
  all[weekKey()]={projects:[],wins:[],blockers:[],milestones:[],reactions:{},comments:[]};
  saveAll(all);
  render();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  document.getElementById('week-chip').textContent = weekLabel();
  const d = currentData();

  const total=d.projects.length, complete=d.projects.filter(p=>p.status==='complete').length,
        blocked=d.projects.filter(p=>p.status==='blocked').length, wins=d.wins.length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Active projects</div></div>
    <div class="stat"><div class="stat-num">${complete}</div><div class="stat-lbl">Complete</div></div>
    <div class="stat"><div class="stat-num">${blocked}</div><div class="stat-lbl">Blocked</div></div>
    <div class="stat"><div class="stat-num">${wins}</div><div class="stat-lbl">Wins this week</div></div>`;

  const left=document.getElementById('col-left');
  const right=document.getElementById('col-right');
  left.innerHTML=''; right.innerHTML='';

  left.appendChild(buildSection('projects','Active projects & status',d.projects,{hasStatus:true}));
  left.appendChild(buildSection('milestones','Upcoming milestones',d.milestones,{metaKey:'date',metaPlaceholder:'Date (e.g. Apr 18)'}));
  right.appendChild(buildSection('wins','Key wins & highlights',d.wins,{}));
  right.appendChild(buildSection('blockers','Blockers & risks',d.blockers,{metaKey:'owner',metaPlaceholder:'Owner / action'}));
  right.appendChild(buildReactionsBlock(d));
  right.appendChild(buildCommentsBlock(d));
}

function buildSection(id,title,items,opts){
  const wrap=document.createElement('div');
  wrap.style.marginBottom='2rem';

  const labelDiv=document.createElement('div');
  labelDiv.className='sec-label';
  labelDiv.innerHTML=`<span class="sec-label-text">${esc(title)}</span>`;
  wrap.appendChild(labelDiv);

  const itemsDiv=document.createElement('div');
  itemsDiv.className='items';
  if(!items.length){
    itemsDiv.innerHTML=`<div class="empty">Nothing added yet.</div>`;
  } else {
    items.forEach((it,i)=>{
      const row=document.createElement('div');
      row.className='item';
      const badge = opts.hasStatus ? `<span class="badge ${STATUS_MAP[it.status||'on-track'].cls}">${STATUS_MAP[it.status||'on-track'].label}</span>` : '';
      const meta = opts.metaKey && it[opts.metaKey] ? `<div class="item-meta">${esc(it[opts.metaKey])}</div>` : '';
      const del = role==='joy' ? `<button class="del-btn" onclick="delItem('${id}',${i})">✕</button>` : '';
      row.innerHTML=`<div class="item-body"><div class="item-text">${esc(it.text)}</div>${meta}</div>${badge}${del}`;
      itemsDiv.appendChild(row);
    });
  }
  wrap.appendChild(itemsDiv);

  if(role==='joy'){
    const form=document.createElement('div');
    form.className='add-row';
    const statusSel = opts.hasStatus ? `<select class="add-select" id="sel-${id}">
      <option value="on-track">On track</option><option value="at-risk">At risk</option>
      <option value="blocked">Blocked</option><option value="complete">Complete</option>
    </select>` : '';
    const metaIn = opts.metaKey ? `<input class="add-input" id="meta-${id}" placeholder="${opts.metaPlaceholder||''}" style="max-width:120px" onkeydown="if(event.key==='Enter')addItem('${id}')">` : '';
    form.innerHTML=`<input class="add-input" id="in-${id}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addItem('${id}')">${statusSel}${metaIn}<button class="add-go" onclick="addItem('${id}')">Add</button>`;
    wrap.appendChild(form);
  }
  return wrap;
}

function buildReactionsBlock(d){
  const wrap=document.createElement('div');
  wrap.style.marginBottom='2rem';
  const labelDiv=document.createElement('div');
  labelDiv.className='sec-label';
  labelDiv.innerHTML=`<span class="sec-label-text">Jason's reactions</span>`;
  wrap.appendChild(labelDiv);
  const r=d.reactions||{};
  const reacts=document.createElement('div');
  reacts.className='reactions';
  reacts.innerHTML=`<span class="react-lbl">${role==='jason'?'React:':'Reactions:'}</span>`+
    REACT_OPTS.map(opt=>`<button class="rc${r[opt]?' on':''}" onclick="toggleReact('${opt.replace(/'/g,"\\'")}')">${esc(opt)}</button>`).join('');
  wrap.appendChild(reacts);
  return wrap;
}

function buildCommentsBlock(d){
  const wrap=document.createElement('div');
  wrap.className='comment-section';
  const labelDiv=document.createElement('div');
  labelDiv.className='sec-label';
  labelDiv.innerHTML=`<span class="sec-label-text">Comments (${(d.comments||[]).length})</span>`;
  wrap.appendChild(labelDiv);
  const comments=d.comments||[];
  if(!comments.length){
    const e=document.createElement('div');
    e.className='empty'; e.textContent='No comments yet.';
    wrap.appendChild(e);
  } else {
    comments.forEach((c,i)=>{
      const isJoy=c.who==='joy';
      const div=document.createElement('div');
      div.className='comment';
      const del=(role===c.who)?`<button class="cdel" onclick="delComment(${i})">✕</button>`:'';
      div.innerHTML=`<div class="av ${isJoy?'av-joy':'av-jason'}">${isJoy?'JN':'JA'}</div>
        <div class="cb"><div class="cw">${isJoy?'Joy':'Jason'}</div>
        <div class="ct">${esc(c.text)}</div>${del}</div>`;
      wrap.appendChild(div);
    });
  }
  const inputRow=document.createElement('div');
  inputRow.className='comment-input-row';
  inputRow.innerHTML=`<div class="av ${role==='joy'?'av-joy':'av-jason'}">${role==='joy'?'JN':'JA'}</div>
    <textarea class="comment-ta" id="comment-ta" placeholder="${role==='joy'?'Joy':'Jason'}, add a comment..." rows="1"></textarea>
    <button class="csend" onclick="addComment()">Send</button>`;
  wrap.appendChild(inputRow);
  return wrap;
}

function addItem(secId){
  const inp=document.getElementById('in-'+secId);
  if(!inp) return;
  const text=inp.value.trim();
  if(!text) return;
  const d=currentData();
  const item={text};
  const sel=document.getElementById('sel-'+secId);
  if(sel) item.status=sel.value;
  const meta=document.getElementById('meta-'+secId);
  if(meta) item[secId==='blockers'?'owner':'date']=meta.value.trim();
  d[secId].push(item);
  saveData(d); render();
  const newInp=document.getElementById('in-'+secId);
  if(newInp) newInp.focus();
}

function delItem(secId,idx){
  const d=currentData();
  d[secId].splice(idx,1);
  saveData(d); render();
}

function toggleReact(opt){
  if(role!=='jason') return;
  const d=currentData();
  if(!d.reactions) d.reactions={};
  d.reactions[opt]=!d.reactions[opt];
  saveData(d); render();
}

function addComment(){
  const ta=document.getElementById('comment-ta');
  if(!ta) return;
  const text=ta.value.trim();
  if(!text) return;
  const d=currentData();
  if(!d.comments) d.comments=[];
  d.comments.push({who:role,text,ts:Date.now()});
  saveData(d); render();
}

function delComment(idx){
  const d=currentData();
  d.comments.splice(idx,1);
  saveData(d); render();
}

function buildExportText(){
  const d=currentData();
  const lines=[`WEEKLY UPDATE — ${weekLabel().toUpperCase()}`,'Joy · Industry & Learning Operations, KWRI',''];
  if(d.projects.length){
    lines.push('ACTIVE PROJECTS & STATUS','─'.repeat(36));
    d.projects.forEach(p=>lines.push(`• ${p.text}  [${STATUS_MAP[p.status||'on-track'].label}]`));
    lines.push('');
  }
  if(d.wins.length){
    lines.push('KEY WINS & HIGHLIGHTS','─'.repeat(36));
    d.wins.forEach(w=>lines.push(`• ${w.text}`));
    lines.push('');
  }
  if(d.blockers.length){
    lines.push('BLOCKERS & RISKS','─'.repeat(36));
    d.blockers.forEach(b=>lines.push(`• ${b.text}${b.owner?`  → ${b.owner}`:''}`));
    lines.push('');
  }
  if(d.milestones.length){
    lines.push('UPCOMING MILESTONES','─'.repeat(36));
    d.milestones.forEach(m=>lines.push(`• ${m.text}${m.date?`  (${m.date})`:''}`));
    lines.push('');
  }
  return lines.join('\n');
}

function openExport(){
  document.getElementById('export-body').textContent=buildExportText();
  document.getElementById('export-overlay').classList.add('open');
}
function closeExport(){ document.getElementById('export-overlay').classList.remove('open'); }
function copyExport(){
  navigator.clipboard.writeText(buildExportText()).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy to clipboard',2000);
  });
}
document.getElementById('export-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeExport();});

render();
</script>
</body>
</html>
